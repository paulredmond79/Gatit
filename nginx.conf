server {
    listen 80;

    # Trust the Caddy reverse proxy (private/internal network ranges)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    # Use the X-Forwarded-For header set by Caddy to determine the real client IP
    real_ip_header X-Forwarded-For;

    # Recursively resolve the real IP in case of multiple proxy hops
    real_ip_recursive on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
