<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Since Galen Was At It</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }

    .sign {
      background-color: #16213e;
      border: 6px solid #e94560;
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.4);
      margin-bottom: 40px;
      max-width: 90vw;
    }

    .sign-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #a0a0c0;
      margin-bottom: 20px;
    }

    .days-count {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      color: #e94560;
      line-height: 1;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
    }

    .days-label {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #a0a0c0;
      margin-top: 12px;
    }

    .clock-container {
      text-align: center;
    }

    .clock-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #606080;
      margin-bottom: 8px;
    }

    .clock {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #c0c0e0;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <div class="sign">
    <div class="sign-title">Days since Galen was at it</div>
    <div class="days-count">0</div>
    <div class="days-label">Days</div>
  </div>

  <div class="clock-container">
    <div class="clock-label">Current time</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m + ':' + s;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
